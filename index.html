<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smartick COO Office Dashboard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h1>Smartick COO Office</h1>
    <p>Enter the access code to view the dashboard.</p>
    <input id="gate-input" type="password" placeholder="Access code" autocomplete="off" />
    <button id="gate-submit">Enter</button>
    <p id="gate-error" class="gate-error"></p>
  </div>
</div>

<div id="dashboard" class="hidden">
  <header>
    <h1>Smartick COO Office Dashboard</h1>
    <p id="generated-at" class="muted"></p>
  </header>

  <nav id="dept-nav"></nav>

  <main id="dept-sections"></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
